steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "gcr.io/$PROJECT_ID/design-ops-navigator:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/design-ops-navigator:latest"
      - "."

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "gcr.io/$PROJECT_ID/design-ops-navigator"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - design-ops-navigator
      - "--image=gcr.io/$PROJECT_ID/design-ops-navigator:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--concurrency=10"
      - "--timeout=300"
      - "--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_LOCATION=us-central1"

images:
  - "gcr.io/$PROJECT_ID/design-ops-navigator"

options:
  logging: CLOUD_LOGGING_ONLY
